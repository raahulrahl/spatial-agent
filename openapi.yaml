openapi: 3.1.0
info:
  title: Spatial Agent API
  description: |
    A multi-agent system that generates comprehensive spatial transcriptomics analysis plans
    by coordinating three specialized LLM agents: Annotation Specialist, Communication Analyst,
    and Spatial Domain Expert. Provides expert guidance on cell type annotation, cell-cell
    communication analysis, and spatial domain detection strategies.

    Implements the A2A Protocol with JSON-RPC 2.0 methods for agent communication, task
    management, context management, DID resolution, and payment processing.

    ## Why Task-First Architecture?

    This API follows Bindu's **Task-First Agent Pattern** - every interaction creates a trackable task.
    This isn't just about async operations; it enables:

    **Multi-Agent Orchestration**
    - Track work across multiple specialized agents (Annotation Specialist, Communication Analyst, Spatial Domain Expert)
    - Each agent's work becomes a task with clear state and results
    - Orchestrators can coordinate complex workflows by chaining tasks

    **Parallel Execution**
    - Multiple tasks can run simultaneously with unique task IDs
    - Example: Analyze annotation strategies while planning communication analysis in parallel

    **Dependency Management**
    - Use `referenceTaskIds` to chain tasks together
    - Later tasks can reference earlier task results
    - Build complex workflows: Task A → Task B (depends on A) → Task C (depends on B)

    **Context Continuity**
    - Multiple tasks share the same `contextId` for conversation history
    - Maintain context across a series of related requests

    This aligns with the A2A Protocol's "Task-only Agent" pattern where **all responses are Task objects**,
    enabling orchestration at scale.

    **Learn more:** [Task-First Pattern Documentation](https://docs.getbindu.com/bindu/concepts/task-first-pattern)

    ## Getting Started

    ### Authentication
    All JSON-RPC requests require a Bearer token in the Authorization header:
    ```
    Authorization: Bearer YOUR_TOKEN_HERE
    ```

    ### Basic Workflow (Async Task Pattern)

    This API uses an **asynchronous task pattern**. When you send a message, you receive a task ID
    and must poll for completion:

    **Step 1: Send a message** (creates a task)
    ```bash
    curl -X POST http://localhost:3773 \
      -H "Content-Type: application/json" \
      -H "Authorization: Bearer YOUR_TOKEN" \
      -d '{
        "jsonrpc": "2.0",
        "method": "message/send",
        "params": {
          "message": {
            "role": "user",
            "parts": [{"kind": "text", "text": "I have a spatial transcriptomics dataset from human breast cancer tissue. Provide an analysis plan."}],
            "kind": "message",
            "messageId": "9e83c510-5616-49ad-b187-d93cbb800001",
            "contextId": "9e83c510-5616-49ad-b187-d93cbb800002",
            "taskId": "9e83c510-5616-49ad-b187-d93cbb800003"
          },
          "skillId": "spatial-v1",
          "configuration": {
            "acceptedOutputModes": ["application/json"]
          }
        },
        "id": "9e83c510-5616-49ad-b187-d93cbb800003"
      }'
    ```
    Response: Task with `"state": "submitted"`

    **Step 2: Poll for task status** (check if working/completed)
    ```bash
    curl -X POST http://localhost:3773 \
      -H "Content-Type: application/json" \
      -H "Authorization: Bearer YOUR_TOKEN" \
      -d '{
        "jsonrpc": "2.0",
        "method": "tasks/get",
        "params": {"taskId": "9e83c510-5616-49ad-b187-d93cbb800003"},
        "id": "9e83c510-5616-49ad-b187-d93cbb800004"
      }'
    ```
    Response: Task with `"state": "working"` or `"state": "completed"`

    **Step 3: Get results** (when state is "completed")
    The completed task includes:
    - `history`: Full conversation history (user message + assistant response)
    - `artifacts`: Structured results with the final analysis plan

    ### Available JSON-RPC Methods

    - **message/send** - Send a message and create a new task
    - **tasks/get** - Get task details by ID (use for polling)
    - **tasks/list** - List all tasks with pagination
    - **tasks/cancel** - Cancel a running task
    - **tasks/feedback** - Submit feedback for a completed task
    - **contexts/list** - List conversation contexts
    - **contexts/clear** - Clear a conversation context

    ### Task States

    - `submitted` - Task created, not yet started
    - `working` - Task is being processed by agents
    - `completed` - Task finished successfully (check artifacts for results)
    - `failed` - Task encountered an error
    - `canceled` - Task was canceled by user
    - `input-required` - Task needs additional input from user

    ### Example Use Cases

    - "I have a spatial transcriptomics dataset from human breast cancer tissue. Provide an analysis plan for cell type annotation and communication analysis."
    - "Create a workflow for analyzing 10x Visium data with 5,000 spots to identify spatial domains and cell-cell interactions."
    - "Recommend tools and methods for spatial transcriptomics analysis of tumor microenvironment."
  version: 1.0.0
servers:
  - url: http://localhost:3773
    description: Local development server
  - url: https://spatial-agent.bindu-agents.bindus.directory
    description: Production server
security:
  - bearerAuth: []
paths:
  /:
    post:
      summary: JSON-RPC 2.0 endpoint
      description: |
        All JSON-RPC methods are sent as POST requests to this endpoint.

        **Available Methods:**
        - `message/send` - Send a message and create a new task
        - `tasks/get` - Get task details by ID (use for polling)
        - `tasks/list` - List all tasks
        - `tasks/cancel` - Cancel a running task
        - `tasks/feedback` - Submit feedback for a task
        - `contexts/list` - List conversation contexts
        - `contexts/clear` - Clear a conversation context

        **Async Task Pattern:**
        1. Call `message/send` to create a task (returns with state "submitted")
        2. Poll `tasks/get` until state changes to "completed" (or "failed")
        3. Extract results from the `artifacts` array in the completed task
      operationId: jsonRpc
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JsonRpcRequest'
            examples:
              messageSend:
                summary: Send a message (Step 1 - Create Task)
                description: Creates a new task for spatial analysis planning
                value:
                  jsonrpc: "2.0"
                  method: "message/send"
                  params:
                    message:
                      role: "user"
                      parts:
                        - kind: "text"
                          text: "I have a spatial transcriptomics dataset from human breast cancer tissue analyzed with 10x Visium. The dataset contains gene expression data for approximately 5,000 spots. I need to identify cell type markers using PanglaoDB, perform cell-cell communication analysis with CellPhoneDB, and visualize spatial distribution."
                      kind: "message"
                      messageId: "9e83c510-5616-49ad-b187-d93cbb800001"
                      contextId: "9e83c510-5616-49ad-b187-d93cbb800002"
                      taskId: "9e83c510-5616-49ad-b187-d93cbb800003"
                    skillId: "spatial-v1"
                    configuration:
                      acceptedOutputModes:
                        - "application/json"
                  id: "9e83c510-5616-49ad-b187-d93cbb800003"
              tasksGet:
                summary: Get task status (Step 2 - Poll for Completion)
                description: Check if the task is completed and retrieve results
                value:
                  jsonrpc: "2.0"
                  method: "tasks/get"
                  params:
                    taskId: "9e83c510-5616-49ad-b187-d93cbb800003"
                  id: "9e83c510-5616-49ad-b187-d93cbb800004"
      responses:
        '200':
          description: Successful JSON-RPC response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcResponse'
              examples:
                messageSendSubmitted:
                  summary: Task created (state = submitted)
                  description: Initial response after sending a message
                  value:
                    jsonrpc: "2.0"
                    id: "9e83c510-5616-49ad-b187-d93cbb800003"
                    result:
                      id: "9e83c510-5616-49ad-b187-d93cbb800003"
                      context_id: "9e83c510-5616-49ad-b187-d93cbb800002"
                      kind: "task"
                      status:
                        state: "submitted"
                        timestamp: "2026-03-12T03:43:46.770501+00:00"
                      history:
                        - kind: "message"
                          role: "user"
                          parts:
                            - kind: "text"
                              text: "I have a spatial transcriptomics dataset from human breast cancer tissue analyzed with 10x Visium..."
                          task_id: "9e83c510-5616-49ad-b187-d93cbb800003"
                          context_id: "9e83c510-5616-49ad-b187-d93cbb800002"
                          message_id: "9e83c510-5616-49ad-b187-d93cbb800001"
                      artifacts: []
                      metadata: {}
                tasksGetCompleted:
                  summary: Task completed (state = completed)
                  description: Final response with spatial analysis plan in artifacts
                  value:
                    jsonrpc: "2.0"
                    id: "9e83c510-5616-49ad-b187-d93cbb800004"
                    result:
                      id: "9e83c510-5616-49ad-b187-d93cbb800003"
                      context_id: "9e83c510-5616-49ad-b187-d93cbb800002"
                      kind: "task"
                      status:
                        state: "completed"
                        timestamp: "2026-03-12T03:44:07.092657+00:00"
                      history:
                        - kind: "message"
                          role: "user"
                          parts:
                            - kind: "text"
                              text: "I have a spatial transcriptomics dataset from human breast cancer tissue..."
                          task_id: "9e83c510-5616-49ad-b187-d93cbb800003"
                          context_id: "9e83c510-5616-49ad-b187-d93cbb800002"
                          message_id: "9e83c510-5616-49ad-b187-d93cbb800001"
                        - kind: "message"
                          role: "assistant"
                          parts:
                            - kind: "text"
                              text: "### Spatial Analysis Plan:\n\nStep 1: Preprocessing and Quality Control\n- Use Seurat or Scanpy for data quality assessment\n- Normalize using SCTransform or log1p normalization\n\nStep 2: Cell Type Annotation\n- Use PanglaoDB database for marker identification\n- Perform clustering with Louvain or Leiden algorithm\n\n..."
                          task_id: "9e83c510-5616-49ad-b187-d93cbb800003"
                          context_id: "9e83c510-5616-49ad-b187-d93cbb800002"
                          message_id: "73db2481-9fe8-4bd3-8001-2b300607d5d3"
                      artifacts:
                        - name: "result"
                          parts:
                            - kind: "text"
                              text: "### Spatial Analysis Plan:\n\nStep 1: Preprocessing and Quality Control..."
                              metadata:
                                did.message.signature: "65T9Nr8DFRBTihbjj22rpqAzL1KqSFAZRposNWkBuxCupktNV7dGeceSkQCHafxH5t4maCGAv54bqB8cHbtQoGkk"
                          artifact_id: "3840e5a4-2592-4ef9-8899-dffaa5eb4b1a"
                      metadata: {}
        '400':
          description: Invalid JSON-RPC request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcResponse'
              example:
                jsonrpc: "2.0"
                id: "9e83c510-5616-49ad-b187-d93cbb800003"
                error:
                  code: -32600
                  message: "Invalid Request"
        '401':
          description: Unauthorized - missing or invalid bearer token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: "Unauthorized"
      security:
        - bearerAuth: []
      x-code-samples:
        - lang: 'curl'
          label: 'Step 1: Send Message'
          source: |
            curl --location 'http://localhost:3773' \
            --header 'Content-Type: application/json' \
            --header 'Authorization: Bearer YOUR_TOKEN_HERE' \
            --data '{
              "jsonrpc": "2.0",
              "method": "message/send",
              "params": {
                "message": {
                  "role": "user",
                  "parts": [
                    {
                      "kind": "text",
                      "text": "I have a spatial transcriptomics dataset from human breast cancer tissue. Provide an analysis plan."
                    }
                  ],
                  "kind": "message",
                  "messageId": "9e83c510-5616-49ad-b187-d93cbb800001",
                  "contextId": "9e83c510-5616-49ad-b187-d93cbb800002",
                  "taskId": "9e83c510-5616-49ad-b187-d93cbb800003"
                },
                "skillId": "spatial-v1",
                "configuration": {
                  "acceptedOutputModes": ["application/json"]
                }
              },
              "id": "9e83c510-5616-49ad-b187-d93cbb800003"
            }'
  '/.well-known/agent.json':
    get:
      summary: Get Agent Card
      description: Returns the agent's metadata card following the A2A Protocol specification.
      operationId: getAgentCard
      responses:
        '200':
          description: Agent card retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCard'
      security: []
  '/did/resolve':
    post:
      summary: Resolve DID
      description: Resolves a Decentralized Identifier (DID) to its W3C-compliant DID document.
      operationId: resolveDid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - did
              properties:
                did:
                  type: string
                  description: The DID to resolve
                  example: 'did:bindu:paras_at_getbindu_com:spatial-agent:abc123'
      responses:
        '200':
          description: DID document resolved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DidDocument'
      security: []
  '/agent/skills':
    get:
      summary: List Agent Skills
      description: Returns a list of all skills supported by the agent.
      operationId: listSkills
      responses:
        '200':
          description: List of skills
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      $ref: '#/components/schemas/SkillSummary'
                  total:
                    type: integer
                    example: 1
      security: []
  '/agent/skills/{skillId}':
    get:
      summary: Get Skill Details
      description: Returns detailed information about a specific skill.
      operationId: getSkillDetails
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: string
          description: The skill identifier (e.g., 'spatial-v1')
      responses:
        '200':
          description: Skill details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillDetail'
        '404':
          description: Skill not found
      security: []
  '/agent/skills/{skillId}/documentation':
    get:
      summary: Get Skill Documentation
      description: Returns human-readable documentation for a specific skill in Markdown or YAML format.
      operationId: getSkillDocumentation
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: string
          description: The skill identifier
      responses:
        '200':
          description: Skill documentation
          content:
            application/yaml:
              schema:
                type: string
                description: YAML formatted documentation
            text/markdown:
              schema:
                type: string
                description: Markdown formatted documentation
        '404':
          description: Skill not found
      security: []
  '/agent/negotiation':
    post:
      summary: Assess Task Capability
      description: Assess agent's capability to handle a task for negotiation.
      operationId: assessTaskCapability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NegotiationRequest'
      responses:
        '200':
          description: Capability assessment result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NegotiationResponse'
      security: []
  /health:
    get:
      summary: Health Check
      description: Health check endpoint for service monitoring.
      operationId: healthCheck
      responses:
        '200':
          description: Service health information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
      security: []
  /metrics:
    get:
      summary: Prometheus Metrics
      description: Prometheus metrics endpoint for scraping.
      operationId: getMetrics
      responses:
        '200':
          description: Metrics in Prometheus text format
          content:
            text/plain:
              schema:
                type: string
      security: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token authentication. Include `Bearer <token>` in the Authorization header.
  schemas:
    # ----- JSON-RPC -----
    JsonRpcRequest:
      type: object
      required:
        - jsonrpc
        - method
        - id
      properties:
        jsonrpc:
          type: string
          enum: ['2.0']
        method:
          type: string
          enum:
            - message/send
            - tasks/get
            - tasks/list
            - tasks/cancel
            - tasks/feedback
            - contexts/list
            - contexts/clear
        params:
          oneOf:
            - $ref: '#/components/schemas/MessageSendParams'
            - $ref: '#/components/schemas/TasksGetParams'
            - $ref: '#/components/schemas/TasksListParams'
            - $ref: '#/components/schemas/TasksCancelParams'
            - $ref: '#/components/schemas/TasksFeedbackParams'
            - $ref: '#/components/schemas/ContextsListParams'
            - $ref: '#/components/schemas/ContextsClearParams'
        id:
          type: string
          format: uuid
    JsonRpcResponse:
      type: object
      properties:
        jsonrpc:
          type: string
          enum: ['2.0']
        id:
          type: string
          format: uuid
        result:
          oneOf:
            - $ref: '#/components/schemas/Task'
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string
      oneOf:
        - required: [result]
        - required: [error]
    
    # MessageSend
    MessageSendParams:
      type: object
      required:
        - message
      properties:
        message:
          $ref: '#/components/schemas/UserMessage'
        configuration:
          type: object
          properties:
            acceptedOutputModes:
              type: array
              items:
                type: string
                enum: ['application/json', 'text/plain']
        skillId:
          type: string
          description: Skill ID to invoke (e.g., "spatial-v1")
    
    UserMessage:
      type: object
      required:
        - role
        - parts
        - kind
        - messageId
        - contextId
        - taskId
      properties:
        role:
          type: string
          enum: ['user']
        parts:
          type: array
          items:
            $ref: '#/components/schemas/MessagePart'
        kind:
          type: string
          enum: ['message']
        messageId:
          type: string
          format: uuid
        contextId:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
        referenceTaskIds:
          type: array
          items:
            type: string
            format: uuid
        metadata:
          type: object
    
    MessagePart:
      type: object
      required:
        - kind
      properties:
        kind:
          type: string
          enum: ['text']
        text:
          type: string
        metadata:
          type: object
    
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        context_id:
          type: string
          format: uuid
        kind:
          type: string
          enum: ['task']
        status:
          $ref: '#/components/schemas/TaskStatus'
        history:
          type: array
          items:
            $ref: '#/components/schemas/HistoryMessage'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/Artifact'
        metadata:
          type: object
    
    TaskStatus:
      type: object
      required:
        - state
        - timestamp
      properties:
        state:
          type: string
          enum: [submitted, working, input-required, auth-required, completed, failed, canceled, rejected]
        timestamp:
          type: string
          format: date-time
    
    HistoryMessage:
      type: object
      properties:
        kind:
          type: string
        role:
          type: string
        parts:
          type: array
          items:
            $ref: '#/components/schemas/MessagePart'
        task_id:
          type: string
          format: uuid
        context_id:
          type: string
          format: uuid
        message_id:
          type: string
          format: uuid
    
    Artifact:
      type: object
      properties:
        name:
          type: string
        parts:
          type: array
          items:
            $ref: '#/components/schemas/MessagePart'
        artifact_id:
          type: string
          format: uuid
        metadata:
          type: object
    
    # TasksGet
    TasksGetParams:
      type: object
      required:
        - taskId
      properties:
        taskId:
          type: string
          format: uuid
    
    # TasksList
    TasksListParams:
      type: object
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 100
        offset:
          type: integer
          minimum: 0
    
    # TasksCancel
    TasksCancelParams:
      type: object
      required:
        - taskId
      properties:
        taskId:
          type: string
          format: uuid
    
    # TasksFeedback
    TasksFeedbackParams:
      type: object
      required:
        - taskId
        - feedback
      properties:
        taskId:
          type: string
          format: uuid
        feedback:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        metadata:
          type: object
    
    # ContextsList
    ContextsListParams:
      type: object
      properties:
        length:
          type: integer
          minimum: 1
          maximum: 100
    
    # ContextsClear
    ContextsClearParams:
      type: object
      required:
        - contextId
      properties:
        contextId:
          type: string
          format: uuid
    
    # ----- Agent Card -----
    AgentCard:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        url:
          type: string
        version:
          type: string
        protocolVersion:
          type: string
        skills:
          type: array
          items:
            type: object
        capabilities:
          type: object
        kind:
          type: string
        agentTrust:
          type: string
        defaultInputModes:
          type: array
          items:
            type: string
        defaultOutputModes:
          type: array
          items:
            type: string
    
    # ----- DID Document -----
    DidDocument:
      type: object
      properties:
        '@context':
          type: array
          items:
            type: string
        id:
          type: string
        created:
          type: string
          format: date-time
        authentication:
          type: array
          items:
            type: object
    
    # ----- Skills -----
    SkillSummary:
      type: object
      properties:
        id:
          type: string
          example: 'spatial-v1'
        name:
          type: string
          example: 'spatial'
        description:
          type: string
          example: 'Multi-agent system that generates spatial transcriptomics analysis plans'
        version:
          type: string
          example: '1.0.0'
        tags:
          type: array
          items:
            type: string
          example: ['spatial-transcriptomics', 'analysis-planning', 'bioinformatics', 'multi-agent']
        input_modes:
          type: array
          items:
            type: string
          example: ['text/plain', 'application/json']
        output_modes:
          type: array
          items:
            type: string
          example: ['text/plain', 'application/json']
        examples:
          type: array
          items:
            type: string
          example:
            - 'I have a spatial transcriptomics dataset from human breast cancer tissue. Provide an analysis plan.'
            - 'Create a workflow for analyzing 10x Visium data with 5,000 spots.'
    
    SkillDetail:
      allOf:
        - $ref: '#/components/schemas/SkillSummary'
        - type: object
          properties:
            author:
              type: string
              example: 'paras@getbindu.com'
            capabilities_detail:
              type: object
            requirements:
              type: object
            performance:
              type: object
            documentation:
              type: object
            assessment:
              type: object
    
    # ----- Negotiation -----
    NegotiationRequest:
      type: object
      required:
        - task_summary
      properties:
        task_summary:
          type: string
          maxLength: 10000
        task_details:
          type: string
        input_mime_types:
          type: array
          items:
            type: string
        output_mime_types:
          type: array
          items:
            type: string
    
    NegotiationResponse:
      type: object
      properties:
        accepted:
          type: boolean
        score:
          type: number
          format: float
        confidence:
          type: number
          format: float
        rejection_reason:
          type: string
        subscores:
          type: object
    
    # ----- Health -----
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, error]
        ready:
          type: boolean
        uptime_seconds:
          type: number
        version:
          type: string
